<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Wedding Seating Finder</title>


<link rel="stylesheet" href="style.css">


<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet">


</head>



<body>


<main class="page">


<section class="content">



<div class="monogram" id="coupleInitials">

</div>



<div class="date" id="weddingDate">

</div>



<div class="divider"></div>




<h1 id="welcomeTitle">

</h1>




<p class="subtitle" id="welcomeSubtitle">

</p>







<!-- SEARCH AREA -->

<form class="search-area" id="searchArea">



<label id="searchLabel">

</label>




<input

type="text"

id="guestName"

autocomplete="off"

/>





<button type="submit" id="searchButton">

</button>




</form>







<!-- RESULT AREA -->

<div class="result hidden">


</div>






</section>


</main>






<script type="module" src="app.js"></script>



</body>


</html>
